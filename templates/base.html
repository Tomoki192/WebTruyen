<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebTruyen</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f3f4f6;
        color: #111827;
      }

      /* ================= NAVBAR ================= */
      nav {
        background: #e5e7eb;
        border-bottom: 1px solid #d1d5db;
        padding: 14px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-left,
      .nav-right {
        display: flex;
        align-items: center;
        gap: 22px;
        flex-wrap: wrap;
      }

      nav a {
        color: #111827;
        text-decoration: none;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: 0.2s;
      }

      nav a:hover {
        color: #2563eb;
      }

      nav a:hover i {
        transform: scale(1.15);
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
        background: linear-gradient(135deg, #2563eb, #9333ea);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        white-space: nowrap;
      }

      .logout-form {
        display: inline;
        margin: 0;
      }

      .logout-btn {
        background: none;
        border: none;
        color: #111827;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0;
        transition: 0.2s;
      }

      .logout-btn:hover {
        color: #2563eb;
      }

      /* ================= CONTAINER ================= */
      .container {
        width: 92%;
        max-width: 1100px;
        margin: 30px auto;
        background: white;
        padding: 28px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      /* ================= BUTTON ================= */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        background: #2563eb;
        color: white !important;
        border: none;
        padding: 10px 18px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.25s;
      }

      .btn:hover {
        transform: translateY(-2px);
        opacity: 0.95;
      }

      .btn-save {
        background: linear-gradient(135deg, #ec4899, #db2777);
      }

      .btn-create {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
      }

      .btn-edit {
        background: linear-gradient(135deg, #22c55e, #16a34a);
      }

      .btn-delete {
        background: linear-gradient(135deg, #ef4444, #dc2626);
      }

      .btn.small {
        padding: 7px 11px;
        border-radius: 9px;
        font-size: 13px;
      }

      .disabled-btn {
        background: #d1d5db !important;
        color: #6b7280 !important;
        cursor: not-allowed;
        transform: none !important;
        opacity: 1 !important;
      }

      .action-group {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      /* ================= CHAPTER LIST IN STORY DETAIL ================= */
      .chapter-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        padding: 13px;
        border-radius: 12px;
        background: #f9fafb;
        transition: 0.2s;
      }

      .chapter-item:hover {
        background: #f1f5f9;
      }

      .chapter-link {
        flex: 1;
        text-decoration: none;
        color: #111827;
        font-weight: 500;
      }

      .chapter-link:hover {
        color: #2563eb;
      }

      .chapter-actions {
        display: flex;
        gap: 7px;
      }

      .back-link {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 500;
      }

      /* ================= FORM ================= */
      input,
      textarea,
      select {
        width: 100%;
        padding: 11px;
        margin-top: 6px;
        margin-bottom: 16px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .section-title {
        font-size: 28px;
        margin-bottom: 22px;
      }

      /* ================= FILTER ================= */
      .filter-box {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 30px;
      }

      .filter-box form {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .filter-box input[type="text"] {
        width: 360px;
        max-width: 100%;
        height: 44px;
        margin: 0;
        padding: 0 14px;
      }

      .filter-box .btn {
        height: 44px;
        padding: 0 20px;
      }

      .filter-row {
        margin-top: 14px;
      }

      /* ================= STORY CARD ================= */
      .story-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 22px;
      }

      .story-card {
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        transition: 0.25s;
        background: white;
      }

      .story-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .story-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        object-position: top;
        display: block;
      }

      .story-card-body {
        padding: 14px;
      }

      .story-card-body h3 {
        margin: 0 0 8px;
        font-size: 17px;
        line-height: 1.35;
      }

      .story-card:hover h3 {
        color: #2563eb;
      }

      .muted {
        color: #6b7280;
        font-size: 13px;
        line-height: 1.6;
      }

      .tag {
        background: #e5e7eb;
        color: #111827;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 13px;
        text-decoration: none;
        margin: 3px;
        display: inline-block;
      }

      .tag.active {
        background: #2563eb;
        color: white;
      }

      /* ================= VIEW COUNT ================= */
      .view-count {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #64748b;
        font-size: 14px;
        font-weight: 500;
      }

      .view-count i {
        font-size: 13px;
        color: #64748b;
      }

      .view-count.light,
      .view-count.light i {
        color: #e5e7eb;
      }

      .story-meta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        color: #6b7280;
        font-size: 14px;
        line-height: 1.6;
      }

      .meta-dot {
        color: #9ca3af;
      }

      /* ================= PAGINATION ================= */
      .pagination-box {
        margin-top: 32px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .pagination-current {
        font-weight: bold;
        color: #111827;
        background: #f3f4f6;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid #e5e7eb;
      }

      /* ================= RECOMMEND SLIDER ================= */
      .recommend-slider {
        position: relative;
        padding: 0 18px;
      }

      .recommend-wrapper {
        overflow-x: auto;
        overflow-y: hidden;
        margin: 20px 0 30px;
        scroll-behavior: smooth;
        scrollbar-width: none;
      }

      .recommend-wrapper::-webkit-scrollbar {
        display: none;
      }

      .recommend-track {
        display: flex;
        gap: 16px;
        width: max-content;
        animation: scrollX 28s linear infinite;
      }

      .recommend-wrapper:hover .recommend-track {
        animation-play-state: paused;
      }

      .recommend-card {
        width: 180px;
        min-width: 180px;
        height: 260px;
        flex: 0 0 180px;
        border-radius: 18px;
        overflow: hidden;
        position: relative;
        color: white;
        text-decoration: none;
        background: #111827;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.16);
      }

      .recommend-card img,
      .no-cover {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
        display: block;
      }

      .no-cover {
        background: linear-gradient(135deg, #374151, #111827);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }

      .recommend-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 38px 12px 12px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        color: white;
        font-size: 13px;
      }

      .recommend-title {
        font-size: 15px;
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .recommend-chapter {
        font-size: 13px;
        color: #e5e7eb;
        margin-top: 5px;
      }

      .slider-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 30;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        border: none;
        background: rgba(17, 24, 39, 0.88);
        color: white;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: 0.25s;
      }

      .recommend-slider:hover .slider-btn {
        opacity: 1;
      }

      .slider-btn:hover {
        background: #2563eb;
        transform: translateY(-50%) scale(1.08);
      }

      .slider-left {
        left: -4px;
      }

      .slider-right {
        right: -4px;
      }

      @keyframes scrollX {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      /* ================= TOP + TRENDING ================= */
      .ranking-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 30px 0;
      }

      .ranking-box {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 18px;
        transition: 0.25s;
      }

      .ranking-box:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      .ranking-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 0;
        margin-bottom: 14px;
        font-size: 20px;
      }

      .icon-box {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 16px;
      }

      .icon-box.star {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
      }

      .icon-box.trend {
        background: linear-gradient(135deg, #ef4444, #dc2626);
      }

      .ranking-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #e5e7eb;
        text-decoration: none;
        color: #111827;
      }

      .ranking-item:last-child {
        border-bottom: none;
      }

      .ranking-item:hover {
        color: #2563eb;
      }

      .rank-name {
        flex: 1;
      }

      .rank-number {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 14px;
        flex-shrink: 0;
        transition: 0.2s;
      }

      .ranking-item:hover .rank-number {
        transform: scale(1.1);
      }

      /* ================= CHAPTER DETAIL ================= */
      .chapter-nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        margin: 25px 0;
        flex-wrap: wrap;
      }

      .chapter-nav.bottom {
        margin-top: 35px;
      }

      .chapter-content {
        max-width: 900px;
        margin: 30px auto;
        text-align: center;
      }

      .chapter-text {
        max-width: 760px;
        margin: 30px auto;
        font-size: 20px;
        line-height: 1.8;
        text-align: left;
      }

      .reader-image {
        width: 100%;
        max-width: 900px;
        height: auto;
        margin: 0 auto 20px;
        display: block;
        border-radius: 10px;
        object-fit: contain;
      }

      .chapter-number-box {
        text-align: center;
        margin: 25px 0;
      }

      .chapter-number-list {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 15px;
      }

      .chapter-number {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: #e5e7eb;
        color: #111827;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        transition: 0.2s;
      }

      .chapter-number:hover,
      .chapter-number.active {
        background: #2563eb;
        color: white;
      }

      .comment-box {
        background: #f9fafb;
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 12px;
      }

      /* ================= ERROR ================= */
      .error-box {
        background: #fee2e2;
        border: 1px solid #dc2626;
        color: #b91c1c;
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 16px;
        font-weight: bold;
      }

      /* ================= MOBILE ================= */
      @media (max-width: 700px) {
        nav {
          padding: 12px 18px;
          flex-wrap: wrap;
          gap: 12px;
        }

        .nav-left,
        .nav-right {
          width: 100%;
          justify-content: flex-start;
          flex-wrap: wrap;
          gap: 14px;
        }

        .container {
          width: 95%;
          padding: 18px;
        }

        .filter-box input[type="text"],
        .filter-box .btn {
          width: 100%;
        }

        .story-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 14px;
        }

        .story-card img {
          height: 170px;
        }

        .ranking-grid {
          grid-template-columns: 1fr;
        }

        .recommend-slider {
          padding: 0 10px;
        }

        .recommend-card {
          width: 150px;
          min-width: 150px;
          height: 220px;
          flex: 0 0 150px;
        }

        .slider-left {
          left: -2px;
        }

        .slider-right {
          right: -2px;
        }

        .chapter-item {
          flex-direction: column;
          align-items: flex-start;
        }

        .chapter-nav {
          gap: 10px;
        }

        .chapter-nav .btn {
          padding: 9px 12px;
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <nav>
      <div class="nav-left">
        <a href="{% url 'home' %}" class="logo">
          <i class="fa-solid fa-book-open"></i> WebTruyen
        </a>

        <a href="{% url 'home' %}">
          <i class="fa-solid fa-house"></i> Trang chủ
        </a>

        {% if user.is_authenticated %}
        <a href="{% url 'my_bookmarks' %}">
          <i class="fa-solid fa-heart"></i> Truyện đã lưu
        </a>

        {% if user.role == 'uploader' %}
        <a href="{% url 'create_story' %}">
          <i class="fa-solid fa-pen"></i> Đăng truyện
        </a>

        <a href="{% url 'create_chapter' %}">
          <i class="fa-solid fa-upload"></i> Đăng chapter
        </a>
        {% endif %} {% endif %}
      </div>

      <div class="nav-right">
        {% if user.is_authenticated %}
        <a href="{% url 'profile' %}">
          <i class="fa-solid fa-user"></i> {{ user.username }}
        </a>

        <form method="post" action="{% url 'logout' %}" class="logout-form">
          {% csrf_token %}
          <button class="logout-btn" type="submit">
            <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
          </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">
          <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
        </a>

        <a href="{% url 'register' %}">
          <i class="fa-solid fa-user-plus"></i> Đăng ký
        </a>
        {% endif %}
      </div>
    </nav>

    <div class="container">{% block content %}{% endblock %}</div>
  </body>
</html>
